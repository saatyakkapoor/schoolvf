global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "schoolvf-api"

  - job_name: "vision-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["vision-worker:8001"]
        labels:
          service: "schoolvf-vision-worker"
